services:
  signal-api:
    # Pinned base 0.99 + signal-cli hotfixed to 0.14.5 (see signal-api-patched/
    # Dockerfile). Upgrade only after re-running the M1 protocol checks.
    build: ./signal-api-patched
    image: signalberry-signal-api:0.99-cli0.14.5
    container_name: signal-api
    restart: always
    ports:
      - "5000:8080"
    environment:
      - MODE=json-rpc
      - LOG_LEVEL=info
    volumes:
      - ${HOME}/.local/share/signal-api:/home/.local/share/signal-cli

  bridge:
    build: .
    container_name: signal-bridge
    restart: always
    ports:
      - "9099:9099"
    environment:
      - SIGNAL_API_URL=http://signal-api:8080
      - SIGNAL_NUMBER=${SIGNAL_NUMBER}   # set in your shell or a .env file
    volumes:
      - bridge-data:/data
    depends_on:
      - signal-api

volumes:
  bridge-data:
