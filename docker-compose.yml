services:
  signal-api:
    # Pinned base 0.99 + signal-cli hotfixed to 0.14.5 (see signal-api-patched/
    # Dockerfile). Upgrade only after re-running the M1 protocol checks.
    build: ./signal-api-patched
    image: signalberry-signal-api:0.99-cli0.14.5
    container_name: signal-api
    restart: always
    ports:
      - "5000:8080"
    environment:
      - MODE=json-rpc
      - LOG_LEVEL=info
    volumes:
      - ${HOME}/.local/share/signal-api:/home/.local/share/signal-cli

  bridge:
    build: .
    container_name: signal-bridge
    restart: always
    ports:
      - "9099:9099"
    environment:
      - SIGNAL_API_URL=http://signal-api:8080
      - SIGNAL_NUMBER=${SIGNAL_NUMBER}   # set in your shell or a .env file
      # remote-access shared secret. Empty/unset = auth OFF (LAN only).
      - SB_AUTH_TOKEN=${SB_AUTH_TOKEN:-}
      - BRIDGE_TOKEN=${BRIDGE_TOKEN:-}   # legacy alias
    volumes:
      - bridge-data:/data
    depends_on:
      - signal-api

  # Bearer-token gate in front of signal-cli-rest-api (which has no auth itself).
  # Expose THIS (port 5001) instead of signal-api directly when going remote;
  # the bearer token then protects both services regardless of transport.
  # Dormant by default; start with:  docker compose --profile remote up -d signal-api-auth
  signal-api-auth:
    image: nginx:alpine
    container_name: signal-api-auth
    restart: always
    profiles: ["remote"]
    environment:
      - SB_AUTH_TOKEN=${SB_AUTH_TOKEN:-${BRIDGE_TOKEN:-}}
    volumes:
      - ./remote/signal-api-auth.conf.template:/etc/nginx/templates/default.conf.template:ro
    ports:
      - "${API_AUTH_PORT:-5001}:80"
    depends_on:
      - signal-api

  # OPTIONAL example transport: outbound Cloudflare tunnel (defeats CGNAT, no
  # inbound ports). Use any tunnel/VPN/proxy instead — the token protects the
  # services either way. Dormant; start with: docker compose --profile remote up -d
  # Needs CF_TUNNEL_TOKEN in .env. (If you run cloudflared natively, skip this.)
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: signal-cloudflared
    restart: always
    profiles: ["remote"]
    command: tunnel --no-autoupdate run --token ${CF_TUNNEL_TOKEN:-}
    depends_on:
      - signal-api
      - bridge

volumes:
  bridge-data:
